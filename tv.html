<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Home Media Server TV</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          align-items: center;
          background: #101114;
          color: #f7f4ed;
          display: flex;
          font: 22px/1.35 system-ui, sans-serif;
          inset: 0;
          justify-content: center;
          padding: 40px;
          position: fixed;
          text-align: center;
        "
      >
        Starting My Home Media Server TV...
      </div>
    </div>
    <script>
      function showMyHomeMediaServerTvBootProblem(label, message) {
        window.setTimeout(function () {
          var root = document.getElementById('root')

          if (
            root &&
            root.textContent.indexOf('Starting My Home Media Server TV') !== -1
          ) {
            root.innerHTML =
              '<div style="padding:40px;font:22px/1.35 system-ui,sans-serif;color:#ffd9d4;background:#2a1210;">My Home Media Server TV ' +
              label +
              ': ' +
              String(message || 'Unknown error') +
              '</div>'
          }
        }, 1800)
      }

      window.addEventListener('error', function (event) {
        showMyHomeMediaServerTvBootProblem(
          'boot error',
          event.message || event.error,
        )
      })
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason && (event.reason.message || event.reason)

        showMyHomeMediaServerTvBootProblem('async error', reason)
      })
    </script>
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
    <script src="./home-media-config.js"></script>
    <script type="module" src="/src/tv-main.tsx"></script>
  </body>
</html>
